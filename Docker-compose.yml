services:
  mysql:
    image: mysql:8.4
    container_name: eduplanner_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: eduplanner
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: eduplanner_backend
    restart: always
    depends_on:
      - mysql
    ports:
      - "5050:5050"
    environment:
      DB_USER: root
      DB_PASSWORD: root123
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: eduplanner

volumes:
 mysql_data: